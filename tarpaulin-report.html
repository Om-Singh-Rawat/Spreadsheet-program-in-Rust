                                   serde_json::from_str(\u0026json_str).unwrap()\n                                    } else {\n                                        serde_wasm_bindgen::from_value(response).unwrap()\n                                    };\n\n                                let id = response_obj[\"data\"][\"id\"].as_str().unwrap().to_string();\n                                current_id_clone.set(Some(id.clone()));\n                                web_sys::console::log_1(\u0026\"Successfully created spreadsheet\".into());\n\n                                // --- Immediately update with current content ---\n                                let spreadsheet_clone2 = spreadsheet_clone.clone();\n                                let api_client_clone2 = api_client_clone.clone();\n                                spawn_local(async move {\n                                    let csv_content = spreadsheet_clone2.export_csv();\n                                    match api_client_clone2\n                                        .update_spreadsheet(\u0026id, None, Some(csv_content))\n                                        .await\n                                    {\n                                        Ok(_) =\u003e web_sys::console::log_1(\n                                            \u0026\"Spreadsheet content updated after creation\".into(),\n                                        ),\n                                        Err(e) =\u003e web_sys::console::error_1(\u0026e),\n                                    }\n                                });\n                            }\n                            Err(e) =\u003e web_sys::console::error_1(\u0026e),\n                        }\n                    });\n                }\n            }\n        })\n    };\n\n    // Load handler\n    let on_load_by_id = {\n        let spreadsheet = spreadsheet.clone();\n        Callback::from(move |id: String| {\n            let spreadsheet = spreadsheet.clone();\n            spawn_local(async move {\n                let url = format!(\"/api/spreadsheets/{}\", id);\n                let resp = match Request::get(\u0026url).send().await {\n                    Ok(r) =\u003e r,\n                    Err(e) =\u003e {\n                        web_sys::console::error_1(\n                            \u0026format!(\"Failed to fetch spreadsheet: {:?}\", e).into(),\n                        );\n                        return;\n                    }\n                };\n                let json: Result\u003cApiResponse\u003cSpreadsheetData\u003e, _\u003e = resp.json().await;\n                match json {\n                    Ok(api_resp) =\u003e {\n                        let csv_content = api_resp.data.content;\n                        let mut new_sheet = (*spreadsheet).clone();\n                        if let Err(e) = new_sheet.import_csv(\u0026csv_content) {\n                            web_sys::console::error_1(\u0026format!(\"Import error: {:?}\", e).into());\n                        } else {\n                            spreadsheet.set(new_sheet);\n                            web_sys::console::log_1(\u0026\"Spreadsheet loaded successfully!\".into());\n                        }\n                    }\n                    Err(e) =\u003e {\n                        web_sys::console::error_1(\u0026format!(\"JSON parse error: {:?}\", e).into());\n                    }\n                }\n            });\n        })\n    };\n\n    let on_load_by_name = {\n        let spreadsheet = spreadsheet.clone();\n        let api_client = api_client.clone();\n        Callback::from(move |name: String| {\n            let spreadsheet = spreadsheet.clone();\n            let api_client = api_client.clone();\n            spawn_local(async move {\n                match api_client.get_spreadsheet_by_name(\u0026name).await {\n                    Ok(js_value) =\u003e {\n                        // Deserialize the API response wrapper, not just SpreadsheetData\n                        let api_response: ApiResponse\u003cOption\u003cSpreadsheetData\u003e\u003e =\n                            from_value(js_value).unwrap();\n                        if let Some(data) = api_response.data {\n                            let mut new_sheet = (*spreadsheet).clone();\n                            if let Err(e) = new_sheet.import_csv(\u0026data.content) {\n                                web_sys::console::error_1(\u0026format!(\"Import error: {:?}\", e).into());\n                            } else {\n                                spreadsheet.set(new_sheet);\n                                web_sys::console::log_1(\u0026\"Spreadsheet loaded by name!\".into());\n                            }\n                        } else {\n                            web_sys::console::error_1(\n                                \u0026\"No spreadsheet data returned from API\".into(),\n                            );\n                        }\n                    }\n                    Err(e) =\u003e {\n                        web_sys::console::error_1(\u0026format!(\"Load by name error: {:?}\", e).into());\n                    }\n                }\n            });\n        })\n    };\n\n    let on_cell_change = {\n        let spreadsheet = spreadsheet.clone();\n        let current_id = current_id.clone();\n        let api_client = api_client.clone();\n\n        Callback::from(move |(row, col, value): (usize, usize, String)| {\n            let mut new_sheet = (*spreadsheet).clone();\n\n            // Build A1-style reference\n            let cell_ref = format!(\"{}{}\", Spreadsheet::column_index_to_label(col), row + 1);\n\n            if let Err(e) = new_sheet.assign(\u0026cell_ref, \u0026value.trim()) {\n                web_sys::console::error_1(\u0026JsValue::from_str(\u0026format!(\n                    \"Error: assignment to {} failed\",\n                    cell_ref\n                )));\n            }\n\n            spreadsheet.set(new_sheet);\n\n            // If we have a current spreadsheet ID, update the cell on the server\n            if let Some(id) = (*current_id).clone() {\n                let id_clone = id.clone();\n                let value_clone = value.clone();\n                let api_client = api_client.clone();\n\n                spawn_local(async move {\n                    match api_client\n                        .update_single_cell(\u0026id_clone, row, col, value_clone)\n                        .await\n                    {\n                        Ok(_) =\u003e {}\n                        Err(e) =\u003e web_sys::console::error_1(\u0026e),\n                    }\n                });\n            }\n        })\n    };\n\n    // Add a button to list all spreadsheets\n    let on_list_spreadsheets = {\n        let api_client = api_client.clone();\n\n        Callback::from(move |_| {\n            let api_client_clone = api_client.clone();\n\n            spawn_local(async move {\n                match api_client_clone.list_spreadsheets().await {\n                    Ok(response) =\u003e {\n                        web_sys::console::log_1(\u0026response);\n                        // You could update a state here to display the list in the UI\n                    }\n                    Err(e) =\u003e web_sys::console::error_1(\u0026e),\n                }\n            });\n        })\n    };\n\n    html! {\n        \u003cdiv class=\"app-container\"\u003e\n            \u003cToolbar\n                on_import={on_import}\n                on_export={on_export}\n                on_save={on_save}\n                on_load_by_name={on_load_by_name.clone()}\n                on_list_spreadsheets={on_list_spreadsheets}\n            /\u003e\n            \u003cSpreadsheetGrid\n                rows={20}\n                cols={10}\n                spreadsheet={(*spreadsheet).clone()}\n                on_change={on_cell_change}\n                on_load_by_name={on_load_by_name.clone()}\n            /\u003e\n        \u003c/div\u003e\n    }\n}\n\nuse wasm_bindgen::prelude::wasm_bindgen;\n#[wasm_bindgen(start)]\npub fn run() {\n    web_sys::console::log_1(\u0026\"Starting Yew app...\".into());\n\n    let window = web_sys::window().unwrap();\n    let document = window.document().unwrap();\n    let root = document.get_element_by_id(\"root\").unwrap();\n    yew::Renderer::\u003cApp\u003e::with_root(root).render();\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","ravi-kumawat","VSCode","Rust","spreadsheet","spreadsheet_ui","core","src","lib.rs"],"content":"pub mod spreadsheet;\nuse std::collections::{HashMap, HashSet};\n\n#[cfg(feature = \"cli\")]\npub fn run_cli() {\n    println!(\"CLI mode disabled.\");\n}\n\n#[cfg(feature = \"wasm\")]\npub mod wasm {\n    use super::spreadsheet::Spreadsheet;\n    use wasm_bindgen::prelude::*;\n\n    #[wasm_bindgen]\n    #[derive(Clone, PartialEq)]\n    pub struct WasmSheet {\n        inner: Spreadsheet,\n    }\n\n    #[wasm_bindgen]\n    impl WasmSheet {\n        #[wasm_bindgen(constructor)]\n        pub fn new(rows: usize, cols: usize) -\u003e Self {\n            console_error_panic_hook::set_once();\n            WasmSheet {\n                inner: Spreadsheet::new(rows, cols),\n            }\n        }\n\n        #[wasm_bindgen]\n        pub fn assign(\u0026mut self, cell: \u0026str, expr: \u0026str) -\u003e Result\u003c(), JsValue\u003e {\n            self.inner\n                .handle_assignment(\u0026format!(\"{}={}\", cell, expr))\n                .map_err(|e| JsValue::from_str(\u0026e))\n        }\n\n        #[wasm_bindgen]\n        pub fn get(\u0026self, row: usize, col: usize) -\u003e i32 {\n            self.inner.get_cell_value(row, col).unwrap_or(0)\n        }\n\n        #[wasm_bindgen]\n        pub fn get_content(\u0026self, row: usize, col: usize) -\u003e String {\n            self.inner.get_cell_content(row, col)\n        }\n\n        #[wasm_bindgen]\n        pub fn is_formula(\u0026self, row: usize, col: usize) -\u003e bool {\n            self.inner.is_formula(row, col)\n        }\n\n        #[wasm_bindgen]\n        pub fn get_error(\u0026self, row: usize, col: usize) -\u003e Option\u003cString\u003e {\n            self.inner.get_error(row, col)\n        }\n\n        #[wasm_bindgen]\n        pub fn get_cell_value(\u0026self, row: usize, col: usize) -\u003e i32 {\n            self.inner.get_cell_value(row, col).unwrap_or(0)\n        }\n\n        #[wasm_bindgen]\n        pub fn process_input(\u0026mut self, input: \u0026str) -\u003e Result\u003c(), JsValue\u003e {\n            self.inner\n                .handle_assignment(input)\n                .map_err(|e| JsValue::from_str(\u0026e))\n        }\n\n        #[wasm_bindgen]\n        pub fn import_csv(\u0026mut self, csv_data: \u0026str) -\u003e Result\u003c(), JsValue\u003e {\n            self.inner.import_csv(csv_data).map_err(|e| {\n                let error_msg = format!(\"Import failed: {}\", e);\n                web_sys::console::error_1(\u0026JsValue::from_str(\u0026error_msg));\n                JsValue::from_str(\u0026error_msg)\n            })\n        }\n\n        #[wasm_bindgen]\n        pub fn export_csv(\u0026self) -\u003e String {\n            self.inner.export_csv()\n        }\n\n        #[wasm_bindgen]\n        pub fn download_csv(\u0026self, filename: \u0026str) -\u003e Result\u003c(), JsValue\u003e {\n            let csv_data = self.inner.export_csv();\n            // Create a Uint8Array from the CSV string\n            let array = js_sys::Uint8Array::new_with_length(csv_data.len() as u32);\n            array.copy_from(csv_data.as_bytes());\n            // Create a Blob and download URL\n            let blob = web_sys::Blob::new_with_u8_array_sequence(\u0026js_sys::Array::of1(\u0026array))?;\n            let url = web_sys::Url::create_object_url_with_blob(\u0026blob)?;\n\n            // Create and trigger a download link\n            let window = web_sys::window().unwrap();\n            let document = window.document().unwrap();\n            let a = document.create_element(\"a\")?;\n            a.set_attribute(\"href\", \u0026url)?;\n            a.set_attribute(\"download\", filename)?;\n            a.dyn_ref::\u003cweb_sys::HtmlElement\u003e().unwrap().click();\n\n            web_sys::Url::revoke_object_url(\u0026url)?;\n            Ok(())\n        }\n\n        #[wasm_bindgen]\n        pub fn column_index_to_label(index: usize) -\u003e String {\n            Spreadsheet::column_index_to_label(index)\n        }\n\n        #[wasm_bindgen]\n        pub fn column_label_to_index(label: \u0026str) -\u003e Option\u003cusize\u003e {\n            Spreadsheet::column_label_to_index(label)\n        }\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","ravi-kumawat","VSCode","Rust","spreadsheet","spreadsheet_ui","core","src","spreadsheet.rs"],"content":"use std::collections::{HashMap, HashSet, VecDeque};\nuse std::io::{self, Write};\n\n#[derive(Debug, Clone, PartialEq)]\nenum Expression {\n    Literal(i32),\n    Cell(usize, usize),\n    BinaryOp(Box\u003cExpression\u003e, char, Box\u003cExpression\u003e),\n    Function(String, String),\n}\n\nenum FunctionArg {\n    Range((usize, usize), (usize, usize)), // ((row1, col1), (row2, col2))\n    #[allow(dead_code)]\n    Cell(usize, usize), // (row, col)\n    #[allow(dead_code)]\n    Literal(i32),\n}\n\n#[derive(Clone, PartialEq)]\npub struct Spreadsheet {\n    grid: Vec\u003cVec\u003ci32\u003e\u003e,\n    rows: usize,\n    cols: usize,\n    view_top: usize,\n    view_left: usize,\n    output_enabled: bool,\n    cell_expressions: HashMap\u003c(usize, usize), Expression\u003e,\n    dependencies: HashMap\u003c(usize, usize), HashSet\u003c(usize, usize)\u003e\u003e, // For each cell, which cells it depends on.\n    reverse_dependencies: HashMap\u003c(usize, usize), HashSet\u003c(usize, usize)\u003e\u003e, // For each cell, which cells depend on it.\n    errors: HashMap\u003c(usize, usize), String\u003e, // Cells with errors (display \"ERR\")\n    cell_raw: HashMap\u003c(usize, usize), String\u003e,\n}\n\nimpl Spreadsheet {\n    pub fn new(rows: usize, cols: usize) -\u003e Self {\n        let grid = vec![vec![0; cols]; rows];\n        Self {\n            grid,\n            rows,\n            cols,\n            view_top: 0,\n            view_left: 0,\n            output_enabled: true,\n            cell_expressions: HashMap::new(),\n            dependencies: HashMap::new(),\n            reverse_dependencies: HashMap::new(),\n            errors: HashMap::new(),\n            cell_raw: HashMap::new(),\n        }\n    }\n\n    // --- Utility functions unchanged ---\n\n    pub fn column_index_to_label(mut index: usize) -\u003e String {\n        let mut label = String::new();\n        index += 1;\n        while index \u003e 0 {\n            let rem = (index - 1) % 26;\n            label.insert(0, (b'A' + rem as u8) as char);\n            index = (index - 1) / 26;\n        }\n        label\n    }\n\n    pub fn column_label_to_index(label: \u0026str) -\u003e Option\u003cusize\u003e {\n        let mut index = 0;\n        for c in label.chars() {\n            if !c.is_ascii_uppercase() {\n                return None;\n            }\n            index = index * 26 + (c as usize - 'A' as usize + 1);\n        }\n        Some(index - 1)\n    }\n\n    pub fn print_grid(\u0026self) {\n        if !self.output_enabled {\n            return;\n        }\n        print!(\"{:\u003c4}\", \"\");\n        for j in self.view_left..(self.view_left + 10).min(self.cols) {\n            print!(\"{:\u003c4}\", Self::column_index_to_label(j));\n        }\n        println!();\n\n        for i in self.view_top..(self.view_top + 10).min(self.rows) {\n            print!(\"{:\u003c4}\", i + 1);\n            for j in self.view_left..(self.view_left + 10).min(self.cols) {\n                if let Some(_) = self.errors.get(\u0026(i, j)) {\n                    print!(\"{:\u003c4}\", \"ERR\");\n                } else {\n                    print!(\"{:\u003c4}\", self.grid[i][j]);\n                }\n            }\n            println!();\n        }\n    }\n\n    pub fn update_cell(\u0026mut self, row: usize, col: usize, value: i32) {\n        if row \u003c self.rows \u0026\u0026 col \u003c self.cols {\n            self.grid[row][col] = value;\n        }\n    }\n\n    pub fn get_cell_value(\u0026self, row: usize, col: usize) -\u003e Option\u003ci32\u003e {\n        self.grid.get(row)?.get(col).copied()\n    }\n\n    pub fn parse_cell_reference(cell: \u0026str) -\u003e Option\u003c(usize, usize)\u003e {\n        let split_index = cell.find(|c: char| c.is_ascii_digit())?;\n        let (col_part, row_part) = cell.split_at(split_index);\n        if col_part.is_empty() {\n            return None;\n        }\n        let col = Self::column_label_to_index(col_part)?;\n        let row_raw = row_part.parse::\u003cusize\u003e().ok()?;\n        if row_raw == 0 {\n            return None;\n        }\n        Some((row_raw - 1, col))\n    }\n\n    fn parse_operand(\u0026self, operand: \u0026str) -\u003e Result\u003cExpression, String\u003e {\n        let operand = operand.trim();\n        operand\n            .parse::\u003ci32\u003e()\n            .map(Expression::Literal)\n            .or_else(|_| {\n                if let Some((r, c)) = Self::parse_cell_reference(operand) {\n                    if r \u003e= self.rows || c \u003e= self.cols {\n                        let label = format!(\"{}{}\", Self::column_index_to_label(c), r + 1);\n                        Err(format!(\"Cell {} is out of bounds\", label))\n                    } else {\n                        Ok(Expression::Cell(r, c))\n                    }\n                } else {\n                    Err(format!(\n                        \"'{}' is not a valid integer or cell reference\",\n                        operand\n                    ))\n                }\n            })\n    }\n\n    fn parse_expression(\u0026self, expr: \u0026str) -\u003e Result\u003cExpression, String\u003e {\n        let trimmed = expr.trim();\n\n        if let Some(open_paren) = trimmed.find('(') {\n            if !trimmed.ends_with(')') {\n                return Err(\"invalid function declaration\".to_string());\n            }\n\n            let func_name = trimmed[..open_paren].trim();\n            if func_name.is_empty() {\n                return Err(\"empty function name\".to_string());\n            }\n\n            if !func_name.chars().all(|c| c.is_ascii_alphabetic()) {\n                return Err(format!(\"invalid function name: '{}'\", func_name));\n            }\n\n            let func_name_upper = func_name.to_uppercase();\n            let supported = [\"SUM\", \"AVG\", \"MIN\", \"MAX\", \"STDEV\", \"SLEEP\"];\n            if !supported.contains(\u0026func_name_upper.as_str()) {\n                return Err(format!(\"unknown function: '{}'\", func_name_upper));\n            }\n\n            let arg = trimmed[open_paren + 1..trimmed.len() - 1].trim();\n            let func_arg = self.parse_function_argument(arg)?;\n\n            match func_name_upper.as_str() {\n                \"SUM\" | \"AVG\" | \"MIN\" | \"MAX\" | \"STDEV\" =\u003e {\n                    if !matches!(func_arg, FunctionArg::Range(..)) {\n                        return Err(format!(\"{} requires a range\", func_name_upper));\n                    }\n                }\n                \"SLEEP\" =\u003e {\n                    if !matches!(func_arg, FunctionArg::Cell(..) | FunctionArg::Literal(..)) {\n                        return Err(\"SLEEP requires a cell reference or integer\".to_string());\n                    }\n                }\n                _ =\u003e unreachable!(),\n            }\n\n            Ok(Expression::Function(func_name_upper, arg.to_string()))\n        } else {\n            let operators = ['+', '-', '*', '/'];\n            let mut operator_pos = None;\n            let mut operator_count = 0;\n\n            for (i, c) in trimmed.chars().enumerate() {\n                if operators.contains(\u0026c) {\n                    operator_count += 1;\n                    operator_pos = Some((i, c));\n                }\n            }\n\n            if operator_count == 1 {\n                let (op_pos, op_char) = operator_pos.unwrap();\n                let left = trimmed[..op_pos].trim();\n                let right = trimmed[op_pos + 1..].trim();\n\n                if left.is_empty() || right.is_empty() {\n                    return Err(\"missing operand(s)\".to_string());\n                }\n\n                let left_expr = self.parse_operand(left)?;\n                let right_expr = self.parse_operand(right)?;\n\n                return Ok(Expression::BinaryOp(\n                    Box::new(left_expr),\n                    op_char,\n                    Box::new(right_expr),\n                ));\n            }\n\n            if operator_count == 0 {\n                if let Ok(num) = trimmed.parse::\u003ci32\u003e() {\n                    return Ok(Expression::Literal(num));\n                }\n\n                if let Some((r, c)) = Self::parse_cell_reference(trimmed) {\n                    if r \u003e= self.rows || c \u003e= self.cols {\n                        let label = format!(\"{}{}\", Self::column_index_to_label(c), r + 1);\n                        return Err(format!(\"Cell {} is out of bounds\", label));\n                    }\n                    return Ok(Expression::Cell(r, c));\n                }\n\n                if trimmed.is_empty() {\n                    return Err(\"expression is empty\".to_string());\n                }\n\n                return Err(format!(\"'{}' is not a valid expression\", trimmed));\n            }\n\n            Err(\"expressions can only contain one operator\".to_string())\n        }\n    }\n\n    // --- Dependency Methods ---\n\n    // Extract all cell references (dependencies) from an expression.\n    /// Extract dependencies by walking the expression tree.\n    /// For SUM functions, if the argument decodes to a range, all cells in that range are added.\n    fn extract_dependencies(expr: \u0026Expression) -\u003e HashSet\u003c(usize, usize)\u003e {\n        let mut deps = HashSet::new();\n\n        fn recurse(expr: \u0026Expression, deps: \u0026mut HashSet\u003c(usize, usize)\u003e) {\n            match expr {\n                Expression::Cell(r, c) =\u003e {\n                    deps.insert((*r, *c));\n                }\n                Expression::BinaryOp(left, _, right) =\u003e {\n                    recurse(left, deps);\n                    recurse(right, deps);\n                }\n                Expression::Function(name, arg) =\u003e {\n                    // Handle all range-based functions the same way\n                    match name.as_str() {\n                        \"SUM\" | \"MIN\" | \"MAX\" | \"AVG\" | \"STDEV\" =\u003e {\n                            if let Ok(FunctionArg::Range((r1, c1), (r2, c2))) =\n                                Spreadsheet::parse_function_argument_static(arg)\n                            {\n                                for row in r1.min(r2)..=r1.max(r2) {\n                                    for col in c1.min(c2)..=c1.max(c2) {\n                                        deps.insert((row, col));\n                                    }\n                                }\n                            }\n                        }\n                        // Add other function types here if needed\n                        _ =\u003e {}\n                    }\n                }\n                _ =\u003e {}\n            }\n        }\n\n        recurse(expr, \u0026mut deps);\n        deps\n    }\n\n    /// Update dependencies for a given cell:\n    /// Remove the old dependencies, then extract from the new expression and update both\n    /// forward and reverse dependency maps.\n    fn update_dependencies(\n        \u0026mut self,\n        cell: (usize, usize),\n        expr: \u0026Expression,\n    ) -\u003e Result\u003c(), String\u003e {\n        // Remove old reverse dependencies for this cell.\n        if let Some(old_deps) = self.dependencies.get(\u0026cell) {\n            for dep in old_deps {\n                if let Some(set) = self.reverse_dependencies.get_mut(dep) {\n                    set.remove(\u0026cell);\n                }\n            }\n        }\n\n        // Extract new dependencies from the expression.\n        let new_deps = Self::extract_dependencies(expr);\n        for dep in \u0026new_deps {\n            self.reverse_dependencies\n                .entry(*dep)\n                .or_default()\n                .insert(cell);\n        }\n        self.dependencies.insert(cell, new_deps);\n        Ok(())\n    }\n\n    /// Cycle detection remains unchanged.\n    /// It simulates applying the new dependencies for 'start' and then runs a DFS to detect cycles.\n    pub fn detect_cycle(\u0026self, start: (usize, usize), new_deps: \u0026HashSet\u003c(usize, usize)\u003e) -\u003e bool {\n        let mut visited = HashSet::new();\n        let mut stack = HashSet::new();\n\n        fn dfs(\n            node: (usize, usize),\n            dependencies: \u0026HashMap\u003c(usize, usize), HashSet\u003c(usize, usize)\u003e\u003e,\n            visited: \u0026mut HashSet\u003c(usize, usize)\u003e,\n            stack: \u0026mut HashSet\u003c(usize, usize)\u003e,\n        ) -\u003e bool {\n            if stack.contains(\u0026node) {\n                return true;\n            }\n            if visited.contains(\u0026node) {\n                return false;\n            }\n            visited.insert(node);\n            stack.insert(node);\n            if let Some(neighbors) = dependencies.get(\u0026node) {\n                for \u0026neighbor in neighbors {\n                    if dfs(neighbor, dependencies, visited, stack) {\n                        return true;\n                    }\n                }\n            }\n            stack.remove(\u0026node);\n            false\n        }\n\n        let mut simulated = self.dependencies.clone();\n        simulated.insert(start, new_deps.clone());\n        dfs(start, \u0026simulated, \u0026mut visited, \u0026mut stack)\n    }\n\n    /// Compute a topological order of all cells that are affected by a change starting from `start`.\n    /// This orders cells so that any given cell is recalculated only after its dependencies.\n    pub fn topological_order(\u0026self, start: (usize, usize)) -\u003e Vec\u003c(usize, usize)\u003e {\n        let mut affected = HashSet::new();\n        let mut queue = VecDeque::new();\n        queue.push_back(start);\n        affected.insert(start);\n\n        // Collect all affected cells (BFS via reverse_dependencies).\n        while let Some(cell) = queue.pop_front() {\n            if let Some(dependents) = self.reverse_dependencies.get(\u0026cell) {\n                for \u0026dep in dependents {\n                    if affected.insert(dep) {\n                        queue.push_back(dep);\n                    }\n                }\n            }\n        }\n\n        // Build in-degree counts for the affected cells.\n        let mut in_degree: HashMap\u003c(usize, usize), usize\u003e = HashMap::new();\n        for \u0026cell in \u0026affected {\n            in_degree.insert(cell, 0);\n        }\n        // For each cell, count dependencies that are also affected.\n        for \u0026cell in \u0026affected {\n            if let Some(deps) = self.dependencies.get(\u0026cell) {\n                for \u0026dep in deps {\n                    if affected.contains(\u0026dep) {\n                        *in_degree.entry(cell).or_insert(0) += 1;\n                    }\n                }\n            }\n        }\n\n        // Use a queue to gather all cells with no incoming affected dependency.\n        let mut topo_queue: VecDeque\u003c(usize, usize)\u003e = in_degree\n            .iter()\n            .filter(|\u0026(_, \u0026deg)| deg == 0)\n            .map(|(\u0026cell, _)| cell)\n            .collect();\n        let mut sorted = Vec::new();\n        while let Some(cell) = topo_queue.pop_front() {\n            sorted.push(cell);\n            // Decrease the in-degree for dependents.\n            if let Some(dependents) = self.reverse_dependencies.get(\u0026cell) {\n                for \u0026dep in dependents {\n                    if affected.contains(\u0026dep) {\n                        if let Some(degree) = in_degree.get_mut(\u0026dep) {\n                            *degree = degree.saturating_sub(1);\n                            if *degree == 0 {\n                                topo_queue.push_back(dep);\n                            }\n                        }\n                    }\n                }\n            }\n        }\n        sorted\n    }\n\n    /// Recalculate all dependent cells (including the changed one) in the proper dependency order.\n    /// This version uses topological sorting to ensure that a cell’s dependencies are updated first.\n    pub fn recalculate_dependents(\u0026mut self, cell: (usize, usize)) -\u003e Result\u003c(), String\u003e {\n        // Obtain the topologically sorted order of all affected cells.\n        let sorted_cells = self.topological_order(cell);\n\n        // Process each cell in the determined order.\n        for current in sorted_cells {\n            // Propagate error: if any direct dependency has an error, mark this cell as error.\n            if let Some(deps) = self.dependencies.get(\u0026current) {\n                let mut dep_error = None;\n                for \u0026d in deps {\n                    if let Some(err) = self.errors.get(\u0026d) {\n                        dep_error = Some(err.clone());\n                        break; // Stop at the first encountered error.\n                    }\n                }\n                if dep_error.is_some() {\n                    self.errors.insert(current, \"ERR\".to_string());\n                    self.update_cell(current.0, current.1, 0); // Set to default error value.\n                    continue; // Skip further evaluation for this cell.\n                }\n            }\n            // If no dependency error, evaluate the cell’s expression.\n            if let Some(expr) = self.cell_expressions.get(\u0026current) {\n                match self.evaluate_expression(expr) {\n                    Ok(val) =\u003e {\n                        self.update_cell(current.0, current.1, val);\n                        self.errors.remove(\u0026current); // Clear previous errors.\n                    }\n                    Err(e) =\u003e {\n                        self.errors.insert(current, e.clone());\n                        self.update_cell(current.0, current.1, 0);\n                    }\n                }\n            }\n        }\n        Ok(())\n    }\n\n    // --- End Dependency Methods ---\n\n    // --- Evaluation methods (unchanged) ---\n    fn evaluate_expression(\u0026self, expr: \u0026Expression) -\u003e Result\u003ci32, String\u003e {\n        match expr {\n            Expression::Literal(v) =\u003e Ok(*v),\n            Expression::Cell(r, c) =\u003e self.get_cell_value(*r, *c).ok_or_else(|| {\n                let col_label = Self::column_index_to_label(*c);\n                format!(\"invalid cell reference {}{}\", col_label, r + 1)\n            }),\n            Expression::BinaryOp(lhs, op, rhs) =\u003e {\n                let left_val = self.evaluate_expression(lhs)?;\n                let right_val = self.evaluate_expression(rhs)?;\n                match op {\n                    '+' =\u003e Ok(left_val + right_val),\n                    '-' =\u003e Ok(left_val - right_val),\n                    '*' =\u003e Ok(left_val * right_val),\n                    '/' =\u003e {\n                        if right_val == 0 {\n                            Err(\"division by zero\".to_string())\n                        } else {\n                            Ok(left_val / right_val)\n                        }\n                    }\n                    _ =\u003e Err(\"unknown operator\".to_string()),\n                }\n            }\n            Expression::Function(name, arg) =\u003e match name.as_str() {\n                \"SLEEP\" =\u003e self.handle_sleep(arg),\n                \"MAX\" =\u003e self.handle_max(arg),\n                \"MIN\" =\u003e self.handle_min(arg),\n                \"AVG\" =\u003e self.handle_avg(arg),\n                \"SUM\" =\u003e self.handle_sum(arg),\n                \"STDEV\" =\u003e self.handle_stdev(arg),\n                _ =\u003e Err(format!(\"Unknown function: {}\", name)),\n            },\n        }\n    }\n\n    fn parse_function_argument_static(arg: \u0026str) -\u003e Result\u003cFunctionArg, String\u003e {\n        let trimmed = arg.trim();\n\n        if let Some(colon_pos) = trimmed.find(':') {\n            let (start, end) = trimmed.split_at(colon_pos);\n            let end = \u0026end[1..];\n\n            let start_pos = Self::parse_cell_reference(start)\n                .ok_or_else(|| format!(\"Invalid start cell: '{}'\", start))?;\n            let end_pos = Self::parse_cell_reference(end)\n                .ok_or_else(|| format!(\"Invalid end cell: '{}'\", end))?;\n\n            Ok(FunctionArg::Range(start_pos, end_pos))\n        } else if let Some((row, col)) = Self::parse_cell_reference(trimmed) {\n            Ok(FunctionArg::Cell(row, col))\n        } else if let Ok(val) = trimmed.parse::\u003ci32\u003e() {\n            Ok(FunctionArg::Literal(val))\n        } else {\n            Err(format!(\"Invalid function argument: {}\", trimmed))\n        }\n    }\n\n    // Keep your original method for use in evaluation contexts\n    fn parse_function_argument(\u0026self, arg: \u0026str) -\u003e Result\u003cFunctionArg, String\u003e {\n        // First use the static method to parse the argument\n        let parsed = Self::parse_function_argument_static(arg)?;\n\n        // Then do bounds checking based on the parsed result\n        match parsed {\n            FunctionArg::Range((start_row, start_col), (end_row, end_col)) =\u003e {\n                // Check start cell bounds\n                if start_row \u003e= self.rows || start_col \u003e= self.cols {\n                    let label = format!(\n                        \"{}{}\",\n                        Self::column_index_to_label(start_col),\n                        start_row + 1\n                    );\n                    return Err(format!(\"Start cell {} is out of bounds\", label));\n                }\n\n                // Check end cell bounds\n                if end_row \u003e= self.rows || end_col \u003e= self.cols {\n                    let label = format!(\"{}{}\", Self::column_index_to_label(end_col), end_row + 1);\n                    return Err(format!(\"End cell {} is out of bounds\", label));\n                }\n\n                // Check that range is in ascending order\n                if start_row \u003e end_row || start_col \u003e end_col {\n                    return Err(\"Range must be in ascending order\".to_string());\n                }\n\n                Ok(FunctionArg::Range(\n                    (start_row, start_col),\n                    (end_row, end_col),\n                ))\n            }\n            FunctionArg::Cell(row, col) =\u003e {\n                if row \u003e= self.rows || col \u003e= self.cols {\n                    let label = format!(\"{}{}\", Self::column_index_to_label(col), row + 1);\n                    return Err(format!(\"Cell {} is out of bounds\", label));\n                }\n                Ok(FunctionArg::Cell(row, col))\n            }\n            // Literals don't need bounds checking\n            FunctionArg::Literal(val) =\u003e Ok(FunctionArg::Literal(val)),\n        }\n    }\n\n    // --- Function stubs ---\n    pub fn handle_sleep(\u0026self, arg: \u0026str) -\u003e Result\u003ci32, String\u003e {\n        match self.parse_function_argument(arg)? {\n            FunctionArg::Cell(row, col) =\u003e self.get_cell_value(row, col).ok_or_else(|| {\n                format!(\n                    \"Invalid cell: {}{}\",\n                    Self::column_index_to_label(col),\n                    row + 1\n                )\n            }),\n            FunctionArg::Literal(val) =\u003e Ok(val),\n            _ =\u003e unreachable!(), // Already validated during parsing\n        }\n    }\n\n    pub fn handle_sum(\u0026self, arg: \u0026str) -\u003e Result\u003ci32, String\u003e {\n        // SAFETY: `parse_expression` already guarantees `arg` is a valid range.\n        let FunctionArg::Range((start_row, start_col), (end_row, end_col)) =\n            self.parse_function_argument(arg)?\n        else {\n            // This case is unreachable due to validation in `parse_expression`.\n            unreachable!(\"SUM argument should have been validated as a range during parsing\")\n        };\n\n        let mut sum = 0;\n        for row in start_row.min(end_row)..=start_row.max(end_row) {\n            for col in start_col.min(end_col)..=start_col.max(end_col) {\n                if let Some(value) = self.get_cell_value(row, col) {\n                    sum += value;\n                } else {\n                    let cell_label = format!(\"{}{}\", Self::column_index_to_label(col), row + 1);\n                    return Err(format!(\"invalid cell in range: {}\", cell_label));\n                }\n            }\n        }\n        Ok(sum)\n    }\n\n    pub fn handle_max(\u0026self, arg: \u0026str) -\u003e Result\u003ci32, String\u003e {\n        // Get range from argument\n        let FunctionArg::Range((start_row, start_col), (end_row, end_col)) =\n            self.parse_function_argument(arg)?\n        else {\n            unreachable!(\"MAX argument should have been validated as a range during parsing\")\n        };\n\n        let mut values = Vec::new();\n        for row in start_row.min(end_row)..=start_row.max(end_row) {\n            for col in start_col.min(end_col)..=start_col.max(end_col) {\n                if let Some(value) = self.get_cell_value(row, col) {\n                    values.push(value);\n                } else {\n                    let cell_label = format!(\"{}{}\", Self::column_index_to_label(col), row + 1);\n                    return Err(format!(\"invalid cell in range: {}\", cell_label));\n                }\n            }\n        }\n\n        if values.is_empty() {\n            return Err(\"MAX of empty range\".to_string());\n        }\n\n        Ok(*values.iter().max().unwrap())\n    }\n\n    pub fn handle_min(\u0026self, arg: \u0026str) -\u003e Result\u003ci32, String\u003e {\n        // Get range from argument\n        let FunctionArg::Range((start_row, start_col), (end_row, end_col)) =\n            self.parse_function_argument(arg)?\n        else {\n            unreachable!(\"MIN argument should have been validated as a range during parsing\")\n        };\n\n        let mut values = Vec::new();\n        for row in start_row.min(end_row)..=start_row.max(end_row) {\n            for col in start_col.min(end_col)..=start_col.max(end_col) {\n                if let Some(value) = self.get_cell_value(row, col) {\n                    values.push(value);\n                } else {\n                    let cell_label = format!(\"{}{}\", Self::column_index_to_label(col), row + 1);\n                    return Err(format!(\"invalid cell in range: {}\", cell_label));\n                }\n            }\n        }\n\n        if values.is_empty() {\n            return Err(\"MIN of empty range\".to_string());\n        }\n\n        Ok(*values.iter().min().unwrap())\n    }\n\n    pub fn handle_avg(\u0026self, arg: \u0026str) -\u003e Result\u003ci32, String\u003e {\n        // Get range from argument\n        let FunctionArg::Range((start_row, start_col), (end_row, end_col)) =\n            self.parse_function_argument(arg)?\n        else {\n            unreachable!(\"AVG argument should have been validated as a range during parsing\")\n        };\n\n        let mut sum = 0;\n        let mut count = 0;\n\n        for row in start_row.min(end_row)..=start_row.max(end_row) {\n            for col in start_col.min(end_col)..=start_col.max(end_col) {\n                if let Some(value) = self.get_cell_value(row, col) {\n                    sum += value;\n                    count += 1;\n                } else {\n                    let cell_label = format!(\"{}{}\", Self::column_index_to_label(col), row + 1);\n                    return Err(format!(\"invalid cell in range: {}\", cell_label));\n                }\n            }\n        }\n\n        if count == 0 {\n            return Err(\"AVG of empty range\".to_string());\n        }\n\n        // Integer division (truncating)\n        Ok(sum / count)\n    }\n\n    pub fn handle_stdev(\u0026self, arg: \u0026str) -\u003e Result\u003ci32, String\u003e {\n        // Get range from argument\n        let FunctionArg::Range((start_row, start_col), (end_row, end_col)) =\n            self.parse_function_argument(arg)?\n        else {\n            unreachable!(\"STDEV argument should have been validated as a range during parsing\")\n        };\n\n        // Collect all values\n        let mut values = Vec::new();\n        for row in start_row.min(end_row)..=start_row.max(end_row) {\n            for col in start_col.min(end_col)..=start_col.max(end_col) {\n                if let Some(value) = self.get_cell_value(row, col) {\n                    values.push(value);\n                } else {\n                    let cell_label = format!(\"{}{}\", Self::column_index_to_label(col), row + 1);\n                    return Err(format!(\"invalid cell in range: {}\", cell_label));\n                }\n            }\n        }\n\n        if values.len() \u003c= 1 {\n            return Err(\"STDEV needs at least two values\".to_string());\n        }\n\n        // Calculate mean\n        let sum: i32 = values.iter().sum();\n        let mean = sum as f64 / values.len() as f64;\n\n        // Calculate variance\n        let variance = values\n            .iter()\n            .map(|\u0026x| {\n                let diff = x as f64 - mean;\n                diff * diff\n            })\n            .sum::\u003cf64\u003e()\n            / (values.len() - 1) as f64;\n\n        // Return standard deviation as integer (rounded)\n        Ok(variance.sqrt().round() as i32)\n    }\n\n    // --- Assignment \u0026 Dependency Methods (with cycle detection and recalculation) ---\n    pub fn handle_assignment(\u0026mut self, input: \u0026str) -\u003e Result\u003c(), String\u003e {\n        let parts: Vec\u003c\u0026str\u003e = input.splitn(2, '=').collect();\n        if parts.len() != 2 {\n            return Err(\"unrecognized cmd\".to_string());\n        }\n\n        let cell_ref = parts[0].trim();\n        let expr = parts[1].trim();\n\n        let (target_row, target_col) = Self::parse_cell_reference(cell_ref)\n            .ok_or_else(|| format!(\"invalid cell format: '{}'\", cell_ref))?;\n\n        if target_row \u003e= self.rows || target_col \u003e= self.cols {\n            return Err(\"target cell out of bounds\".to_string());\n        }\n\n        let parsed_expr = self.parse_expression(expr)?;\n\n        // Extract new dependencies\n        let new_deps = Self::extract_dependencies(\u0026parsed_expr);\n\n        // Check for cycles\n        if self.detect_cycle((target_row, target_col), \u0026new_deps) {\n            return Err(\"cycle detected\".to_string());\n        }\n\n        // Store new expression _only_ if it’s not a pure literal,\n        // otherwise drop any previous formula.\n        if !matches!(parsed_expr, Expression::Literal(_)) {\n            self.cell_expressions\n                .insert((target_row, target_col), parsed_expr.clone());\n        } else {\n            self.cell_expressions.remove(\u0026(target_row, target_col));\n        }\n\n        self.cell_raw\n            .insert((target_row, target_col), expr.to_string());\n\n        // Update the dependencies, and handle cycle detection here\n        if let Err(_) = self.update_dependencies((target_row, target_col), \u0026parsed_expr) {\n            return Err(\"cycle detected\".to_string()); // Return early on cycle detection\n        }\n\n        // Evaluate expression and handle errors\n        let value = match self.evaluate_expression(\u0026parsed_expr) {\n            Ok(val) =\u003e {\n                self.errors.remove(\u0026(target_row, target_col)); // Clear any previous errors\n                val\n            }\n            Err(e) =\u003e {\n                self.errors.insert((target_row, target_col), e.clone()); // Store error\n                0 // Use a fallback value for grid when an error occurs\n            }\n        };\n\n        // Update the grid cell with the evaluated value or error\n        self.update_cell(target_row, target_col, value);\n\n        // Force recalculation of dependents, even if value didn't change\n        let _ = self.recalculate_dependents((target_row, target_col));\n\n        Ok(()) // Always return Ok unless cycle detected\n    }\n\n    pub fn scroll(\u0026mut self, dir: \u0026str) {\n        match dir {\n            \"w\" =\u003e self.view_top = self.view_top.saturating_sub(10),\n            \"s\" =\u003e self.view_top = (self.view_top + 10).min(self.rows.saturating_sub(10)),\n            \"a\" =\u003e self.view_left = self.view_left.saturating_sub(10),\n            \"d\" =\u003e self.view_left = (self.view_left + 10).min(self.cols.saturating_sub(10)),\n            _ =\u003e {}\n        }\n    }\n\n    pub fn handle_scroll_to(\u0026mut self, input: \u0026str) -\u003e Result\u003c(), String\u003e {\n        let parts: Vec\u003c\u0026str\u003e = input.split_whitespace().collect();\n        if parts.len() != 2 {\n            return Err(\"Usage: scroll_to \u003ccell\u003e\".to_string());\n        }\n        if let Some((row, col)) = Self::parse_cell_reference(parts[1]) {\n            if row \u003e= self.rows || col \u003e= self.cols {\n                return Err(\"scroll_to: cell out of bounds\".to_string());\n            }\n            self.view_top = row;\n            self.view_left = col;\n            Ok(())\n        } else {\n            Err(\"invalid cell reference in scroll_to\".to_string())\n        }\n    }\n\n    pub fn process_input(\u0026mut self, input: \u0026str) -\u003e Result\u003c(), String\u003e {\n        let trimmed = input.trim().to_string();\n        match trimmed.as_str() {\n            \"disable_output\" =\u003e {\n                self.output_enabled = false;\n                Ok(())\n            }\n            \"enable_output\" =\u003e {\n                self.output_enabled = true;\n                Ok(())\n            }\n            _ =\u003e {\n                if trimmed.starts_with(\"scroll_to\") {\n                    self.handle_scroll_to(input)\n                } else {\n                    self.handle_assignment(input)\n                }\n            }\n        }\n    }\n\n    /// Return the *raw* contents of a cell.  \n    /// If it was entered as a formula/expression, we return that;  \n    /// otherwise we return its literal value as a string.\n    pub fn get_cell_content(\u0026self, row: usize, col: usize) -\u003e String {\n        if let Some(raw) = self.cell_raw.get(\u0026(row, col)) {\n            // always echo exactly what the user typed: \"A1+1\" or \"10\"\n            raw.clone()\n        } else {\n            // first‐time cells are blank → show zero\n            self.get_cell_value(row, col).unwrap_or(0).to_string()\n        }\n    }\n\n    /// True if this cell was ever assigned a parsed‐expression (i.e. is a “formula”).\n    pub fn is_formula(\u0026self, row: usize, col: usize) -\u003e bool {\n        self.cell_expressions.contains_key(\u0026(row, col))\n    }\n\n    /// If the last computation of this cell errored, return the error string.\n    pub fn get_error(\u0026self, row: usize, col: usize) -\u003e Option\u003cString\u003e {\n        self.errors.get(\u0026(row, col)).cloned()\n    }\n\n    // In spreadsheet.rs\n    pub fn import_csv(\u0026mut self, csv_data: \u0026str) -\u003e Result\u003c(), String\u003e {\n        let mut rdr = csv::ReaderBuilder::new()\n            .has_headers(false)\n            .flexible(true) // Allow variable row lengths\n            .from_reader(csv_data.as_bytes());\n\n        for (row_idx, result) in rdr.records().enumerate() {\n            let record = result.map_err(|e| format!(\"CSV error (row {}): {}\", row_idx + 1, e))?;\n\n            if row_idx \u003e= self.rows {\n                return Err(format!(\"CSV exceeds row limit (max {})\", self.rows));\n            }\n\n            for (col_idx, field) in record.iter().enumerate() {\n                if col_idx \u003e= self.cols {\n                    return Err(format!(\n                        \"CSV row {} exceeds column limit (max {})\",\n                        row_idx + 1,\n                        self.cols\n                    ));\n                }\n\n                let cell_ref = format!(\"{}{}\", Self::column_index_to_label(col_idx), row_idx + 1);\n\n                // Skip empty fields\n                let trimmed = field.trim();\n                if trimmed.is_empty() {\n                    continue;\n                }\n\n                // Handle quoted fields and escaped quotes\n                let sanitized = trimmed.replace(\"\\\"\\\"\", \"\\\"\"); // Unescape double quotes\n                self.handle_assignment(\u0026format!(\"{}={}\", cell_ref, sanitized))\n                    .map_err(|e| format!(\"Error in cell {}: {}\", cell_ref, e))?;\n            }\n        }\n        Ok(())\n    }\n\n    pub fn export_csv(\u0026self) -\u003e String {\n        let mut wtr = csv::WriterBuilder::new()\n            .delimiter(b',')\n            .from_writer(vec![]);\n\n        for row in 0..self.rows {\n            let mut record = vec![];\n            for col in 0..self.cols {\n                // Convert Option\u003ci32\u003e to String\n                let cell_str = match self.get_cell_value(row, col) {\n                    Some(val) =\u003e val.to_string(),\n                    None =\u003e \"\".to_string(),\n                };\n                record.push(cell_str);\n            }\n            wtr.write_record(\u0026record).unwrap();\n        }\n        String::from_utf8(wtr.into_inner().unwrap()).unwrap()\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","ravi-kumawat","VSCode","Rust","spreadsheet","spreadsheet_ui","server","src","handlers.rs"],"content":"use rocket::http::Status;\nuse rocket::response::status;\nuse rocket::serde::json::Json;\nuse rocket::State;\n\nuse crate::models::{\n    ApiResponse, CellUpdates, NewSpreadsheet, SpreadsheetData, SpreadsheetMetadata,\n    UpdateSpreadsheet,\n};\nuse crate::storage::Storage;\n\n// List all spreadsheets\n#[get(\"/spreadsheets\")]\npub fn list_spreadsheets(storage: \u0026State\u003cStorage\u003e) -\u003e Json\u003cApiResponse\u003cVec\u003cSpreadsheetMetadata\u003e\u003e\u003e {\n    let spreadsheets = storage.list_spreadsheets();\n\n    Json(ApiResponse {\n        status: \"success\".to_string(),\n        data: Some(spreadsheets),\n        message: None,\n    })\n}\n\n// Get spreadsheet by ID\n#[get(\"/spreadsheets/\u003cid\u003e\", rank = 2)]\npub fn get_spreadsheet(\n    id: \u0026str,\n    storage: \u0026State\u003cStorage\u003e,\n) -\u003e Result\u003cJson\u003cApiResponse\u003cSpreadsheetData\u003e\u003e, status::Custom\u003cJson\u003cApiResponse\u003c()\u003e\u003e\u003e\u003e {\n    match storage.get_spreadsheet(id) {\n        Some(spreadsheet) =\u003e Ok(Json(ApiResponse {\n            status: \"success\".to_string(),\n            data: Some(spreadsheet),\n            message: None,\n        })),\n        None =\u003e Err(status::Custom(\n            Status::NotFound,\n            Json(ApiResponse {\n                status: \"error\".to_string(),\n                data: None,\n                message: Some(format!(\"Spreadsheet with ID {} not found\", id)),\n            }),\n        )),\n    }\n}\n\n// Create new spreadsheet\n#[post(\"/spreadsheets\", data = \"\u003cnew_spreadsheet\u003e\")]\npub fn create_spreadsheet(\n    new_spreadsheet: Json\u003cNewSpreadsheet\u003e,\n    storage: \u0026State\u003cStorage\u003e,\n) -\u003e Json\u003cApiResponse\u003cSpreadsheetData\u003e\u003e {\n    let spreadsheet = storage.create_spreadsheet(\n        new_spreadsheet.name.clone(),\n        new_spreadsheet.rows,\n        new_spreadsheet.cols,\n    );\n\n    Json(ApiResponse {\n        status: \"success\".to_string(),\n        data: Some(spreadsheet),\n        message: None,\n    })\n}\n\n// Update spreadsheet\n#[put(\"/spreadsheets/\u003cid\u003e\", data = \"\u003cupdate\u003e\")]\npub fn update_spreadsheet(\n    id: \u0026str,\n    update: Json\u003cUpdateSpreadsheet\u003e,\n    storage: \u0026State\u003cStorage\u003e,\n) -\u003e Result\u003cJson\u003cApiResponse\u003cSpreadsheetData\u003e\u003e, status::Custom\u003cJson\u003cApiResponse\u003c()\u003e\u003e\u003e\u003e {\n    match storage.update_spreadsheet(id, update.name.clone(), update.content.clone()) {\n        Some(spreadsheet) =\u003e Ok(Json(ApiResponse {\n            status: \"success\".to_string(),\n            data: Some(spreadsheet),\n            message: None,\n        })),\n        None =\u003e Err(status::Custom(\n            Status::NotFound,\n            Json(ApiResponse {\n                status: \"error\".to_string(),\n                data: None,\n                message: Some(format!(\"Spreadsheet with ID {} not found\", id)),\n            }),\n        )),\n    }\n}\n\n// Delete spreadsheet\n#[delete(\"/spreadsheets/\u003cid\u003e\")]\npub fn delete_spreadsheet(\n    id: \u0026str,\n    storage: \u0026State\u003cStorage\u003e,\n) -\u003e Result\u003cJson\u003cApiResponse\u003c()\u003e\u003e, status::Custom\u003cJson\u003cApiResponse\u003c()\u003e\u003e\u003e\u003e {\n    if storage.delete_spreadsheet(id) {\n        Ok(Json(ApiResponse {\n            status: \"success\".to_string(),\n            data: None,\n            message: Some(format!(\"Spreadsheet with ID {} deleted\", id)),\n        }))\n    } else {\n        Err(status::Custom(\n            Status::NotFound,\n            Json(ApiResponse {\n                status: \"error\".to_string(),\n                data: None,\n                message: Some(format!(\"Spreadsheet with ID {} not found\", id)),\n            }),\n        ))\n    }\n}\n\n// Update cells\n#[post(\"/spreadsheets/\u003cid\u003e/cells\", data = \"\u003cupdates\u003e\")]\npub fn update_cells(\n    id: \u0026str,\n    updates: Json\u003cCellUpdates\u003e,\n    storage: \u0026State\u003cStorage\u003e,\n) -\u003e Result\u003cJson\u003cApiResponse\u003cSpreadsheetData\u003e\u003e, status::Custom\u003cJson\u003cApiResponse\u003c()\u003e\u003e\u003e\u003e {\n    let cell_updates: Vec\u003c(usize, usize, String)\u003e = updates\n        .cells\n        .iter()\n        .map(|cell| (cell.row, cell.col, cell.value.clone()))\n        .collect();\n\n    match storage.update_cells(id, \u0026cell_updates) {\n        Some(spreadsheet) =\u003e Ok(Json(ApiResponse {\n            status: \"success\".to_string(),\n            data: Some(spreadsheet),\n            message: None,\n        })),\n        None =\u003e Err(status::Custom(\n            Status::NotFound,\n            Json(ApiResponse {\n                status: \"error\".to_string(),\n                data: None,\n                message: Some(format!(\"Spreadsheet with ID {} not found\", id)),\n            }),\n        )),\n    }\n}\n\n// Export spreadsheet as CSV\n#[get(\"/spreadsheets/\u003cid\u003e/export\")]\npub fn export_spreadsheet(\n    id: \u0026str,\n    storage: \u0026State\u003cStorage\u003e,\n) -\u003e Result\u003cString, status::Custom\u003cJson\u003cApiResponse\u003c()\u003e\u003e\u003e\u003e {\n    match storage.get_spreadsheet(id) {\n        Some(spreadsheet) =\u003e Ok(spreadsheet.content),\n        None =\u003e Err(status::Custom(\n            Status::NotFound,\n            Json(ApiResponse {\n                status: \"error\".to_string(),\n                data: None,\n                message: Some(format!(\"Spreadsheet with ID {} not found\", id)),\n            }),\n        )),\n    }\n}\n\n// Import CSV data\n#[post(\"/spreadsheets/\u003cid\u003e/import\", data = \"\u003ccsv_data\u003e\")]\npub fn import_spreadsheet(\n    id: \u0026str,\n    csv_data: String,\n    storage: \u0026State\u003cStorage\u003e,\n) -\u003e Result\u003cJson\u003cApiResponse\u003cSpreadsheetData\u003e\u003e, status::Custom\u003cJson\u003cApiResponse\u003c()\u003e\u003e\u003e\u003e {\n    match storage.update_spreadsheet(id, None, Some(csv_data)) {\n        Some(spreadsheet) =\u003e Ok(Json(ApiResponse {\n            status: \"success\".to_string(),\n            data: Some(spreadsheet),\n            message: None,\n        })),\n        None =\u003e Err(status::Custom(\n            Status::NotFound,\n            Json(ApiResponse {\n                status: \"error\".to_string(),\n                data: None,\n                message: Some(format!(\"Spreadsheet with ID {} not found\", id)),\n            }),\n        )),\n    }\n}\n\n#[get(\"/spreadsheets/by_name?\u003cname\u003e\", rank = 1)]\npub fn get_spreadsheet_by_name(\n    name: \u0026str,\n    storage: \u0026State\u003cStorage\u003e,\n) -\u003e Result\u003cJson\u003cApiResponse\u003cSpreadsheetData\u003e\u003e, status::Custom\u003cJson\u003cApiResponse\u003c()\u003e\u003e\u003e\u003e {\n    match storage.get_by_name(name) {\n        Some(data) =\u003e Ok(Json(ApiResponse {\n            status: \"success\".to_string(),\n            data: Some(data),\n            message: None,\n        })),\n        None =\u003e Err(status::Custom(\n            Status::NotFound,\n            Json(ApiResponse {\n                status: \"error\".to_string(),\n                data: None,\n                message: Some(format!(\"Spreadsheet with name '{}' not found\", name)),\n            }),\n        )),\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","ravi-kumawat","VSCode","Rust","spreadsheet","spreadsheet_ui","server","src","main.rs"],"content":"use rocket::launch;\n#[macro_use]\nextern crate rocket;\n\nmod handlers;\nmod models;\nmod storage;\n\nuse handlers::*;\nuse rocket::fs::{relative, FileServer};\nuse storage::Storage;\n\n#[launch]\nfn rocket() -\u003e _ {\n    rocket::build()\n        .manage(Storage::new())\n        .mount(\"/\", FileServer::from(relative!(\"static\")))\n        .mount(\n            \"/api\",\n            routes![\n                list_spreadsheets,\n                get_spreadsheet_by_name,\n                get_spreadsheet,\n                create_spreadsheet,\n                update_spreadsheet,\n                delete_spreadsheet,\n                update_cells,\n                export_spreadsheet,\n                import_spreadsheet,\n            ],\n        )\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","ravi-kumawat","VSCode","Rust","spreadsheet","spreadsheet_ui","server","src","models.rs"],"content":"use core::spreadsheet::Spreadsheet;\nuse serde::{Deserialize, Serialize};\nuse uuid::Uuid;\n\n#[derive(Debug, Serialize, Deserialize, Clone)]\npub struct SpreadsheetMetadata {\n    pub id: String,\n    pub name: String,\n    pub created_at: u64,\n    pub updated_at: u64,\n}\n\n#[derive(Debug, Serialize, Deserialize, Clone)]\npub struct SpreadsheetData {\n    pub id: String,\n    pub name: String,\n    pub content: String, // CSV content\n    pub created_at: u64,\n    pub updated_at: u64,\n}\n\n#[derive(Debug, Serialize, Deserialize)]\npub struct NewSpreadsheet {\n    pub name: String,\n    pub rows: usize,\n    pub cols: usize,\n}\n\n#[derive(Debug, Serialize, Deserialize)]\npub struct UpdateSpreadsheet {\n    pub name: Option\u003cString\u003e,\n    pub content: Option\u003cString\u003e,\n}\n\n#[derive(Debug, Serialize, Deserialize)]\npub struct CellUpdate {\n    pub row: usize,\n    pub col: usize,\n    pub value: String,\n}\n\n#[derive(Debug, Serialize, Deserialize)]\npub struct CellUpdates {\n    pub cells: Vec\u003cCellUpdate\u003e,\n}\n\n#[derive(Debug, Serialize, Deserialize)]\npub struct ApiResponse\u003cT\u003e {\n    pub status: String,\n    pub data: Option\u003cT\u003e,\n    pub message: Option\u003cString\u003e,\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","ravi-kumawat","VSCode","Rust","spreadsheet","spreadsheet_ui","server","src","storage.rs"],"content":"use crate::models::{SpreadsheetData, SpreadsheetMetadata};\nuse core::spreadsheet::Spreadsheet;\nuse std::collections::HashMap;\nuse std::sync::RwLock;\nuse uuid::Uuid;\n\npub struct Storage {\n    spreadsheets: RwLock\u003cHashMap\u003cString, SpreadsheetData\u003e\u003e,\n    name_to_id: RwLock\u003cHashMap\u003cString, String\u003e\u003e,\n}\n\nimpl Storage {\n    pub fn new() -\u003e Self {\n        Storage {\n            spreadsheets: RwLock::new(HashMap::new()),\n            name_to_id: RwLock::new(HashMap::new()),\n        }\n    }\n\n    pub fn list_spreadsheets(\u0026self) -\u003e Vec\u003cSpreadsheetMetadata\u003e {\n        let spreadsheets = self.spreadsheets.read().unwrap();\n        spreadsheets\n            .values()\n            .map(|s| SpreadsheetMetadata {\n                id: s.id.clone(),\n                name: s.name.clone(),\n                created_at: s.created_at,\n                updated_at: s.updated_at,\n            })\n            .collect()\n    }\n\n    pub fn get_spreadsheet(\u0026self, id: \u0026str) -\u003e Option\u003cSpreadsheetData\u003e {\n        let spreadsheets = self.spreadsheets.read().unwrap();\n        spreadsheets.get(id).cloned()\n    }\n\n    pub fn get_by_name(\u0026self, name: \u0026str) -\u003e Option\u003cSpreadsheetData\u003e {\n        let name_index = self.name_to_id.read().unwrap();\n        name_index\n            .get(name)\n            .and_then(|id| self.spreadsheets.read().unwrap().get(id).cloned())\n    }\n\n    pub fn create_spreadsheet(\u0026self, name: String, rows: usize, cols: usize) -\u003e SpreadsheetData {\n        let id = Uuid::new_v4().to_string();\n        let name_clone = name.clone(); // Clone name before move\n\n        let now = std::time::SystemTime::now()\n            .duration_since(std::time::UNIX_EPOCH)\n            .unwrap()\n            .as_secs();\n\n        let sheet = Spreadsheet::new(rows, cols);\n        let csv_content = sheet.export_csv();\n\n        // Create spreadsheet with original name\n        let spreadsheet = SpreadsheetData {\n            id: id.clone(),\n            name, // name moved here\n            content: csv_content,\n            created_at: now,\n            updated_at: now,\n        };\n\n        // Insert into main storage with cloned ID\n        let mut spreadsheets = self.spreadsheets.write().unwrap();\n        spreadsheets.insert(id.clone(), spreadsheet.clone());\n\n        // Insert into name index with cloned values\n        let mut name_index = self.name_to_id.write().unwrap();\n        name_index.insert(name_clone, id.clone());\n\n        spreadsheet\n    }\n\n    pub fn update_spreadsheet(\n        \u0026self,\n        id: \u0026str,\n        name: Option\u003cString\u003e,\n        content: Option\u003cString\u003e,\n    ) -\u003e Option\u003cSpreadsheetData\u003e {\n        let mut spreadsheets = self.spreadsheets.write().unwrap();\n\n        if let Some(spreadsheet) = spreadsheets.get_mut(id) {\n            let mut name_index = self.name_to_id.write().unwrap();\n            let mut old_name = None;\n\n            // Handle name changes first\n            if let Some(new_name) = \u0026name {\n                // Track old name for index update\n                old_name = Some(spreadsheet.name.clone());\n                // Update the spreadsheet name\n                spreadsheet.name = new_name.clone();\n            }\n\n            // Update content if provided\n            if let Some(new_content) = \u0026content {\n                spreadsheet.content = new_content.clone();\n            }\n\n            // Update timestamps\n            let now = std::time::SystemTime::now()\n                .duration_since(std::time::UNIX_EPOCH)\n                .unwrap()\n                .as_secs();\n            spreadsheet.updated_at = now;\n\n            // Update name-to-ID mapping\n            if let Some(old_name) = old_name {\n                // Remove old name entry\n                name_index.remove(\u0026old_name);\n            }\n            if name.is_some() {\n                // Insert new name entry\n                name_index.insert(spreadsheet.name.clone(), id.to_string());\n            }\n\n            Some(spreadsheet.clone())\n        } else {\n            None\n        }\n    }\n\n    pub fn delete_spreadsheet(\u0026self, id: \u0026str) -\u003e bool {\n        let mut spreadsheets = self.spreadsheets.write().unwrap();\n        spreadsheets.remove(id).is_some()\n    }\n\n    pub fn update_cells(\n        \u0026self,\n        id: \u0026str,\n        updates: \u0026[(usize, usize, String)],\n    ) -\u003e Option\u003cSpreadsheetData\u003e {\n        let mut spreadsheets = self.spreadsheets.write().unwrap();\n\n        if let Some(spreadsheet) = spreadsheets.get_mut(id) {\n            let mut sheet = Spreadsheet::new(20, 10); // Default size\n\n            // Import current content\n            let _ = sheet.import_csv(\u0026spreadsheet.content);\n\n            // Apply updates\n            for (row, col, value) in updates {\n                let cell_ref = format!(\"{}{}\", Spreadsheet::column_index_to_label(*col), row + 1);\n                let assignment = format!(\"{}={}\", cell_ref, value);\n                if let Err(e) = sheet.handle_assignment(\u0026assignment) {\n                    println!(\"Error assigning value to cell {}: {}\", cell_ref, e);\n                    // Optionally handle the error\n                }\n            }\n\n            // Export updated content\n            spreadsheet.content = sheet.export_csv();\n            spreadsheet.updated_at = std::time::SystemTime::now()\n                .duration_since(std::time::UNIX_EPOCH)\n                .unwrap()\n                .as_secs();\n\n            return Some(spreadsheet.clone());\n        }\n\n        None\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","ravi-kumawat","VSCode","Rust","spreadsheet","src","main.rs"],"content":"//! Spreadsheet Engine\n//!\n//! This module implements a terminal-based spreadsheet application.\n//! It supports arithmetic operations, cell references, functions over cell ranges,\n//! dependency tracking, cycle detection, and recalculation ordering.\n//!\n//! Features include:\n//! - Integer-based cell values\n//! - Expressions with +, -, *, /\n//! - Range-based functions: SUM, AVG, MIN, MAX, STDEV\n//! - Special function: SLEEP (accumulates delay from evaluated values)\n//! - Dependency tracking with cycle detection\n//! - Scrollable 10x10 view over a larger grid\n\nuse std::collections::{HashMap, HashSet, VecDeque};\nuse std::io::{self, Write};\n\n/// Represents parsed expressions that can be evaluated.\n#[derive(Clone, Debug)]\nenum Expression {\n    /// Integer literal value\n    Literal(i32),\n    /// Reference to another cell (row, col)\n    Cell(usize, usize),\n    /// Binary operation (e.g., A1 + B2)\n    BinaryOp(Box\u003cExpression\u003e, char, Box\u003cExpression\u003e),\n    /// Function call with name and argument string\n    Function(String, String),\n}\n\n/// Represents parsed arguments passed to functions.\nenum FunctionArg {\n    /// Range of cells (inclusive): ((row1, col1), (row2, col2))\n    Range((usize, usize), (usize, usize)), // ((row1, col1), (row2, col2))\n    #[allow(dead_code)]\n    /// Single cell reference\n    Cell(usize, usize), // (row, col)\n    #[allow(dead_code)]\n    /// Literal value\n    Literal(i32),\n}\n\n/// Spreadsheet model containing state, evaluation logic, and cell data.\nstruct Spreadsheet {\n    /// 2D grid storing cell values\n    grid: Vec\u003cVec\u003ci32\u003e\u003e,\n    /// Total number of rows in the spreadsheet\n    rows: usize,\n    /// Total number of columns in the spreadsheet\n    cols: usize,\n    /// Top row of the current viewport\n    view_top: usize,\n    /// Leftmost column of the current viewport\n    view_left: usize,\n    /// Flag to control grid display output\n    output_enabled: bool,\n    /// Map of cell coordinates to their formulas\n    cell_expressions: HashMap\u003c(usize, usize), Expression\u003e,\n    /// Direct dependencies for each cell\n    dependencies: HashMap\u003c(usize, usize), HashSet\u003c(usize, usize)\u003e\u003e,\n    /// Reverse dependencies for change propagation\n    reverse_dependencies: HashMap\u003c(usize, usize), HashSet\u003c(usize, usize)\u003e\u003e,\n    /// Cells with evaluation errors\n    errors: HashMap\u003c(usize, usize), String\u003e,\n    /// Accumulated sleep duration for SLEEP functions\n    total_sleep_secs: u64,\n    /// Last sleep duration executed\n    last_sleep_time: u64,\n}\n\nimpl Spreadsheet {\n    /// Creates a new spreadsheet with specified dimensions.\n    fn new(rows: usize, cols: usize) -\u003e Self {\n        let grid = vec![vec![0; cols]; rows];\n        Self {\n            grid,\n            rows,\n            cols,\n            view_top: 0,\n            view_left: 0,\n            output_enabled: true,\n            cell_expressions: HashMap::new(),\n            dependencies: HashMap::new(),\n            reverse_dependencies: HashMap::new(),\n            errors: HashMap::new(),\n            total_sleep_secs: 0,\n            last_sleep_time: 0,\n        }\n    }\n\n    // --- Utility functions unchanged ---\n    /// Converts column index to spreadsheet label (e.g., 0 -\u003e A, 27 -\u003e AB).\n    fn column_index_to_label(mut index: usize) -\u003e String {\n        let mut label = String::new();\n        index += 1;\n        while index \u003e 0 {\n            let rem = (index - 1) % 26;\n            label.insert(0, (b'A' + rem as u8) as char);\n            index = (index - 1) / 26;\n        }\n        label\n    }\n\n    /// Converts spreadsheet label to column index (e.g., A -\u003e 0, AB -\u003e 27).\n    fn column_label_to_index(label: \u0026str) -\u003e Option\u003cusize\u003e {\n        let mut index = 0;\n        for c in label.chars() {\n            if !c.is_ascii_uppercase() {\n                return None;\n            }\n            index = index * 26 + (c as usize - 'A' as usize + 1);\n        }\n        Some(index - 1)\n    }\n\n    /// Displays a 10x10 portion of the spreadsheet.\n    fn print_grid(\u0026self) {\n        if !self.output_enabled {\n            return;\n        }\n        print!(\"{:\u003c6} \", \"\");\n        for j in self.view_left..(self.view_left + 10).min(self.cols) {\n            print!(\"{:\u003c6} \", Self::column_index_to_label(j));\n        }\n        println!();\n\n        for i in self.view_top..(self.view_top + 10).min(self.rows) {\n            print!(\"{:\u003c6} \", i + 1);\n            for j in self.view_left..(self.view_left + 10).min(self.cols) {\n                if self.errors.contains_key(\u0026(i, j)) {\n                    print!(\"{:\u003c6} \", \"ERR\");\n                } else {\n                    print!(\"{:\u003c6} \", self.grid[i][j]);\n                }\n            }\n            println!();\n        }\n    }\n\n    /// Updates a cell with a given value directly (used internally).\n    fn update_cell(\u0026mut self, row: usize, col: usize, value: i32) {\n        if row \u003c self.rows \u0026\u0026 col \u003c self.cols {\n            self.grid[row][col] = value;\n        }\n    }\n\n    /// Retrieves the current value of a cell, if present.\n    fn get_cell_value(\u0026self, row: usize, col: usize) -\u003e Option\u003ci32\u003e {\n        self.grid.get(row)?.get(col).copied()\n    }\n\n    /// Parses spreadsheet label (e.g., \"B3\") to (row, col) indices.\n    fn parse_cell_reference(cell: \u0026str) -\u003e Option\u003c(usize, usize)\u003e {\n        let split_index = cell.find(|c: char| c.is_ascii_digit())?;\n        let (col_part, row_part) = cell.split_at(split_index);\n        if col_part.is_empty() {\n            return None;\n        }\n        let col = Self::column_label_to_index(col_part)?;\n        let row_raw = row_part.parse::\u003cusize\u003e().ok()?;\n        if row_raw == 0 {\n            return None;\n        }\n        Some((row_raw - 1, col))\n    }\n\n    /// Parses an operand which may be a number or a cell reference.\n    fn parse_operand(\u0026self, operand: \u0026str) -\u003e Result\u003cExpression, String\u003e {\n        let operand = operand.trim();\n        operand\n            .parse::\u003ci32\u003e()\n            .map(Expression::Literal)\n            .or_else(|_| {\n                if let Some((r, c)) = Self::parse_cell_reference(operand) {\n                    if r \u003e= self.rows || c \u003e= self.cols {\n                        let label = format!(\"{}{}\", Self::column_index_to_label(c), r + 1);\n                        Err(format!(\"Cell {} is out of bounds\", label))\n                    } else {\n                        Ok(Expression::Cell(r, c))\n                    }\n                } else {\n                    Err(format!(\n                        \"'{}' is not a valid integer or cell reference\",\n                        operand\n                    ))\n                }\n            })\n    }\n\n    /// Parses full expressions (e.g., \"A1 + 2\", \"SUM(A1:B2)\", etc).\n    fn parse_expression(\u0026self, expr: \u0026str) -\u003e Result\u003cExpression, String\u003e {\n        let trimmed = expr.trim();\n\n        if let Some(open_paren) = trimmed.find('(') {\n            if !trimmed.ends_with(')') {\n                return Err(\"invalid function declaration\".to_string());\n            }\n\n            let func_name = trimmed[..open_paren].trim();\n            if func_name.is_empty() {\n                return Err(\"empty function name\".to_string());\n            }\n\n            if !func_name.chars().all(|c| c.is_ascii_alphabetic()) {\n                return Err(format!(\"invalid function name: '{}'\", func_name));\n            }\n\n            let func_name_upper = func_name.to_uppercase();\n            let supported = [\"SUM\", \"AVG\", \"MIN\", \"MAX\", \"STDEV\", \"SLEEP\"];\n            if !supported.contains(\u0026func_name_upper.as_str()) {\n                return Err(format!(\"unknown function: '{}'\", func_name_upper));\n            }\n\n            let arg = trimmed[open_paren + 1..trimmed.len() - 1].trim();\n            let func_arg = self.parse_function_argument(arg)?;\n\n            match func_name_upper.as_str() {\n                \"SUM\" | \"AVG\" | \"MIN\" | \"MAX\" | \"STDEV\" =\u003e {\n                    if !matches!(func_arg, FunctionArg::Range(..)) {\n                        return Err(format!(\"{} requires a range\", func_name_upper));\n                    }\n                }\n                \"SLEEP\" =\u003e {\n                    if !matches!(func_arg, FunctionArg::Cell(..) | FunctionArg::Literal(..)) {\n                        return Err(\"SLEEP requires a cell reference or integer\".to_string());\n                    }\n                }\n                _ =\u003e unreachable!(),\n            }\n\n            Ok(Expression::Function(func_name_upper, arg.to_string()))\n        } else {\n            let operators = ['+', '-', '*', '/'];\n            let mut operator_pos = None;\n            let mut operator_count = 0;\n\n            for (i, c) in trimmed.chars().enumerate() {\n                if operators.contains(\u0026c) {\n                    operator_count += 1;\n                    operator_pos = Some((i, c));\n                }\n            }\n\n            if operator_count == 1 {\n                let (op_pos, op_char) = operator_pos.unwrap();\n                let left = trimmed[..op_pos].trim();\n                let right = trimmed[op_pos + 1..].trim();\n\n                // Handle unary minus case\n                if op_char == '-' \u0026\u0026 left.is_empty() {\n                    let right_expr = self.parse_operand(right)?;\n                    return Ok(Expression::BinaryOp(\n                        Box::new(Expression::Literal(0)),\n                        '-',\n                        Box::new(right_expr),\n                    ));\n                }\n\n                if left.is_empty() || right.is_empty() {\n                    return Err(\"missing operand(s)\".to_string());\n                }\n\n                let left_expr = self.parse_operand(left)?;\n                let right_expr = self.parse_operand(right)?;\n\n                return Ok(Expression::BinaryOp(\n                    Box::new(left_expr),\n                    op_char,\n                    Box::new(right_expr),\n                ));\n            }\n\n            if operator_count == 0 {\n                if let Ok(num) = trimmed.parse::\u003ci32\u003e() {\n                    return Ok(Expression::Literal(num));\n                }\n\n                if let Some((r, c)) = Self::parse_cell_reference(trimmed) {\n                    if r \u003e= self.rows || c \u003e= self.cols {\n                        let label = format!(\"{}{}\", Self::column_index_to_label(c), r + 1);\n                        return Err(format!(\"Cell {} is out of bounds\", label));\n                    }\n                    return Ok(Expression::Cell(r, c));\n                }\n\n                if trimmed.is_empty() {\n                    return Err(\"expression is empty\".to_string());\n                }\n\n                return Err(format!(\"'{}' is not a valid expression\", trimmed));\n            }\n\n            Err(\"expressions can only contain one operator\".to_string())\n        }\n    }\n\n    // --- Dependency Methods ---\n\n    /// Extracts all cells referenced by an expression.\n    fn extract_dependencies(expr: \u0026Expression) -\u003e HashSet\u003c(usize, usize)\u003e {\n        let mut deps = HashSet::new();\n\n        fn recurse(expr: \u0026Expression, deps: \u0026mut HashSet\u003c(usize, usize)\u003e) {\n            match expr {\n                Expression::Cell(r, c) =\u003e {\n                    deps.insert((*r, *c));\n                }\n                Expression::BinaryOp(left, _, right) =\u003e {\n                    recurse(left, deps);\n                    recurse(right, deps);\n                }\n                Expression::Function(name, arg) =\u003e match name.as_str() {\n                    \"SUM\" | \"MIN\" | \"MAX\" | \"AVG\" | \"STDEV\" =\u003e {\n                        if let Ok(FunctionArg::Range((r1, c1), (r2, c2))) =\n                            Spreadsheet::parse_function_argument_static(arg)\n                        {\n                            for row in r1.min(r2)..=r1.max(r2) {\n                                for col in c1.min(c2)..=c1.max(c2) {\n                                    deps.insert((row, col));\n                                }\n                            }\n                        }\n                    }\n                    \"SLEEP\" =\u003e {\n                        if let Ok(FunctionArg::Cell(r, c)) =\n                            Spreadsheet::parse_function_argument_static(arg)\n                        {\n                            deps.insert((r, c));\n                        }\n                    }\n                    _ =\u003e {}\n                },\n                _ =\u003e {}\n            }\n        }\n\n        recurse(expr, \u0026mut deps);\n        deps\n    }\n\n    /// Updates dependency maps when a cell’s expression changes.\n    fn update_dependencies(\n        \u0026mut self,\n        cell: (usize, usize),\n        expr: \u0026Expression,\n
