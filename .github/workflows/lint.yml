name: Lint Check

on: [push, pull_request]

jobs:
  lint:
    name: Rust Clippy & Fmt
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Rust
        uses: actions/setup-rust@v1
        with:
          rust-version: stable

      - name: Check code formatting with rustfmt
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy -- -D warnings
