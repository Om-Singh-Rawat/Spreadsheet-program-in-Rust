name: Lint Check

on: [push, pull_request]

jobs:
  lint:
    name: Rust Clippy & Fmt
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting with rustfmt (excluding spreadsheet_ui)
        run: |
          find ./src -name "*.rs" \
            -not -path "./spreadsheet_ui/*" \
            -exec rustfmt --check {} +

      - name: Run Clippy on main crate only
        run: |
          cargo clippy --all-targets --all-features -- -D warnings
