name: Lint Check

on: [push, pull_request]

jobs:
  lint:
    name: Rust Clippy & Fmt
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Rust
        uses: actions/setup-rust@v1
        with:
          rust-version: stable

      - name: Check code formatting with rustfmt (excluding spreadsheet_ui)
        run: |
          find . -name "*.rs" \
            -not -path "./spreadsheet_ui/*" \
            -exec rustfmt --check {} +

      - name: Run Clippy (excluding spreadsheet_ui)
        run: |
          cargo clippy --all-targets --all-features \
            --exclude spreadsheet_ui \
            -- -D warnings
